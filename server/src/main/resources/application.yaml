spring:
  application:
    name: OnePay
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
  jpa:
    show-sql: true
    ddl-auto: update

frontend:
  url: ${FRONTEND_URL}

server:
  port: 8081




