<div class="min-h-screen bg-gray-50 flex items-center justify-center px-4">
  <div class="bg-white border border-gray-200 rounded-xl shadow-sm p-8 w-full max-w-sm">

    <h1 class="text-2xl font-semibold text-gray-900">Submit Documents</h1>
    <p class="text-sm text-gray-500 mt-1 mb-6">Provide your identity document for verification</p>

    @if (error()) {
      <div class="bg-red-50 border border-red-200 text-red-600 text-sm rounded-lg px-4 py-3 mb-4">
        {{ error() }}
      </div>
    }

    @if (success()) {
      <div class="bg-green-50 border border-green-200 text-green-600 text-sm rounded-lg px-4 py-3 mb-4">
        {{ success() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #submitForm="ngForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Document Type</label>
        <select
          name="docType"
          [(ngModel)]="docType"
          required
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent bg-white"
        >
          <option value="AADHAR">Aadhar Card</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Document Number</label>
        <input
          type="text"
          name="docNumber"
          [(ngModel)]="docNumber"
          required
          placeholder="Enter your document number"
          class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
        />
      </div>

      <button
        type="submit"
        [disabled]="loading() || submitForm.invalid"
        class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white rounded-lg py-2 text-sm font-medium transition-colors"
      >
        {{ loading() ? 'Submitting...' : 'Submit for Verification' }}
      </button>
    </form>

    <p class="text-sm text-gray-500 text-center mt-6">
      <a routerLink="/verification/status" class="text-indigo-600 hover:underline font-medium">Check verification status</a>
    </p>

    <div class="border-t border-gray-100 mt-6 pt-6">
      <button
        (click)="logout()"
        class="w-full border border-red-200 text-red-500 hover:bg-red-50 rounded-lg py-2 text-sm font-medium transition-colors"
      >
        Logout
      </button>
    </div>

  </div>
</div>
